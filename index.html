<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>官场卡牌构筑 Demo</title>
  <link rel="stylesheet" href="styles.css?v=ui-slices-1">
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="brand">
        <span class="seal">仕</span>
        <div>
          <h1>官场卡牌构筑</h1>
          <p>以一生有限时间，塑造一种为官方法</p>
        </div>
      </div>
      <nav id="view-tabs" class="view-tabs" aria-label="主要视图">
        <button class="view-tab" data-view="main" aria-pressed="true">当前事务</button>
        <button class="view-tab" data-view="relations" aria-pressed="false">关系朝局</button>
        <button class="view-tab" data-view="deck" aria-pressed="false">卡组牌库</button>
        <button class="view-tab" data-view="life" aria-pressed="false">生平卷</button>
      </nav>
      <div class="top-actions">
        <button id="save-button" class="ghost-button">存档</button>
        <button id="restart-button" class="danger-button">重开</button>
      </div>
      <div id="time-strip" class="time-strip"></div>
    </header>

    <main id="main-view" class="layout app-view">
      <aside class="panel side-panel character-shell">
        <div class="panel-title">人物</div>
        <div id="character-panel"></div>
      </aside>

      <section class="panel event-panel">
        <div class="panel-title">当前事务</div>
        <div id="event-panel"></div>
      </section>

      <aside class="panel side-panel world-shell">
        <div class="panel-title">关系与朝局</div>
        <div id="world-panel"></div>
      </aside>

      <section class="panel hand-panel">
        <div class="hand-head">
          <div>
            <div class="panel-title">行动手牌</div>
            <p id="hand-hint" class="muted"></p>
          </div>
          <div class="round-actions">
            <button id="draw-button">抽牌</button>
            <button id="end-button">结束本季</button>
            <button id="deck-button" class="ghost-button">牌库</button>
          </div>
        </div>
        <div id="hand-panel"></div>
      </section>

      <section class="panel log-panel">
        <div class="panel-title">生平记事</div>
        <div id="log-panel"></div>
      </section>
    </main>

    <section id="relations-view" class="app-view relation-screen hidden" aria-label="关系朝局视图">
      <aside class="panel relation-filter-shell">
        <div class="panel-title">阵营筛选</div>
        <div id="relation-filter-panel"></div>
      </aside>
      <section class="panel relation-map-shell">
        <div class="panel-title">关系视图</div>
        <div id="relation-map-panel"></div>
      </section>
      <aside class="panel relation-detail-shell">
        <div class="panel-title">人物详情</div>
        <div id="relation-detail-panel"></div>
      </aside>
      <section class="panel relation-ledger-shell">
        <div class="panel-title">关系动态</div>
        <div id="relation-ledger-panel"></div>
      </section>
    </section>

    <section id="deck-view" class="app-view deck-screen hidden" aria-label="卡组牌库视图">
      <aside class="panel deck-filter-shell">
        <div class="panel-title">当前牌库</div>
        <div id="deck-filter-panel"></div>
      </aside>
      <section class="panel deck-grid-shell">
        <div class="deck-grid-head">
          <div>
            <div class="panel-title">卡组视图</div>
            <p class="muted">抽牌堆、手牌、弃牌堆与保留牌合并查看。</p>
          </div>
          <div id="deck-stat-panel" class="deck-stat-strip"></div>
        </div>
        <div id="deck-grid-panel"></div>
      </section>
      <aside class="panel deck-detail-shell">
        <div class="panel-title">卡牌详情</div>
        <div id="deck-detail-panel"></div>
      </aside>
    </section>

    <section id="life-view" class="app-view life-screen hidden" aria-label="生平卷视图">
      <div id="life-panel"></div>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="modal-close" class="modal-close">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="src/data/cards.js"></script>
  <script src="src/data/events.js"></script>
  <script src="src/data/offices.js"></script>
  <script src="src/data/endings.js"></script>
  <script src="src/core/state.js"></script>
  <script src="src/core/deck.js"></script>
  <script src="src/core/rules.js"></script>
  <script src="src/ui/render.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
